# Codemagic CI/CD — cloud macOS builds for DokoDocs.
#
# Why this file exists: the iOS SDK (Xcode) is macOS-only, and the primary
# dev machine is Windows. Codemagic runs the build on a hosted Mac so iOS can
# be built, signed, and shipped to TestFlight without owning a Mac.
#
# Two workflows:
#   1. ios-unsigned   — builds a no-codesign .app. Works with zero setup;
#                        use it to confirm the iOS build compiles.
#   2. ios-testflight — builds a signed .ipa and uploads to TestFlight.
#                        Requires the setup in the comments under that workflow.
#
# -----------------------------------------------------------------------------
# ALTERNATIVE (no Codemagic, no $99): free Apple ID + USB — run ON A MAC.
# Codemagic cannot USB-connect to your phone; this route needs a physical Mac
# with your iPhone plugged in. Costs $0 in fees. Caveats: the signing cert
# expires after 7 days (re-run to refresh), max ~3 apps, and Sign in with Apple
# does NOT work on a free "Personal Team" (test in Guest mode instead).
#
#   # one-time, on the Mac:
#   #  - install Xcode from the App Store, then: sudo xcodebuild -license accept
#   #  - flutter doctor   (confirm Xcode ✓)
#   git clone https://github.com/dokodocs/app.git && cd app
#   flutter pub get
#   dart run build_runner build --delete-conflicting-outputs
#   (cd ios && pod install)
#   #  - open ios/Runner.xcworkspace in Xcode
#   #  - Xcode > Settings > Accounts > + > sign in with a free Apple ID
#   #  - Runner target > Signing & Capabilities:
#   #      * check "Automatically manage signing"
#   #      * Team = your name (Personal Team)
#   #      * Bundle Identifier = com.YOURNAME.dokodocs   (must be globally unique)
#   #      * remove the "Sign in with Apple" capability for local testing
#   #  - plug in iPhone, enable Developer Mode (Settings > Privacy & Security)
#   flutter devices           # confirm the iPhone is listed
#   flutter run --release     # builds, installs, launches on the device
#   #  - first launch: iPhone > Settings > General > VPN & Device Management
#   #    > tap your Apple ID > Trust, then relaunch.
# -----------------------------------------------------------------------------

workflows:
  ios-unsigned:
    name: iOS (unsigned sanity build)
    # Free-tier machine: draws from Codemagic's 500 free macOS build
    # minutes/month. (mac_mini_m2 is a paid instance and does NOT use free
    # minutes — switch to it only if you upgrade for faster builds.)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Generate code (drift, l10n)
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Analyze
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app

  ios-testflight:
    name: iOS (signed → TestFlight)
    # Free-tier machine (see note in ios-unsigned above).
    instance_type: mac_mini_m1
    max_build_duration: 90
    # ---------------------------------------------------------------------
    # ONE-TIME SETUP (in the Codemagic UI, not in this file):
    #
    # 1. App Store Connect API key:
    #    Codemagic → Teams → Integrations → App Store Connect → add a key.
    #    Reference its name below in `app_store_connect.auth: integration`.
    #
    # 2. iOS code signing:
    #    Codemagic → your app → Settings → Code signing identities. Upload
    #    (or let Codemagic fetch) an Apple Distribution certificate + an
    #    App Store provisioning profile for bundle id com.dokodocs.dokodocs.
    #    Enable the "Sign in with Apple" capability on that App ID first
    #    (the app ships the com.apple.developer.applesignin entitlement).
    #
    # 3. Create the app record com.dokodocs.dokodocs in App Store Connect.
    #
    # 4. Replace APP_STORE_CONNECT_KEY_ID below with your integration name.
    # ---------------------------------------------------------------------
    integrations:
      app_store_connect: APP_STORE_CONNECT_KEY_ID
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dokodocs.dokodocs
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Generate code (drift, l10n)
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Analyze
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
